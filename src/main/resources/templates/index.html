<!DOCTYPE html>
<html>
<head>
    <title>Lapor Prestasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            color: white;
        }

        nav {
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
        }

        .hero {
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 52px;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .button {
            background: white;
            color: #2a5298;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
        }

        .button:hover {
            background: #ddd;
        }
    </style>
</head>

<body>

<nav>
    <div class="logo">
        🏆 Lapor Prestasi
    </div>

    <div class="menu">
        <a href="#">Beranda</a>
        <a href="#">Prestasi</a>
        <a href="#">Tentang</a>
    </div>
</nav>


<section class="hero">

    <div class="hero-content">
        <h1>
            Selamat Datang di<br>
            Aplikasi Lapor Prestasi
        </h1>

        <p>
            Sistem untuk mencatat dan mengelola berbagai pencapaian prestasi mahasiswa dengan mudah, cepat, dan terorganisir.
        </p>

        <a class="button" href="#">
            Mulai Sekarang
        </a>
    </div>

</section>

</body>
</html>
